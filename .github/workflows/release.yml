name: Release Obsidian plugin

# Push a tag that matches the manifest version to cut a release, e.g.
#   git tag 1.1.0 && git push origin 1.1.0
on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Build
        run: |
          npm ci
          npm test
          npm run build

      - name: Publish release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" main.js manifest.json styles.css --clobber
          else
            gh release create "$tag" --title="$tag" --draft main.js manifest.json styles.css
          fi
